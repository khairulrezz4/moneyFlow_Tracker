name: Auto Deploy on Push

on:
  push:
    branches: [main]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Lint with pylint (optional)
        run: |
          pip install pylint
          pylint bot.py --disable=all --enable=E,F || true
      
      - name: Check syntax
        run: |
          python -m py_compile bot.py
      
      - name: Deploy to Railway
        if: success()
        run: |
          echo "✅ All checks passed. Railway will auto-deploy from GitHub."
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      
      # Alternative: Deploy to Digital Ocean via SSH
      # Uncomment if using Digital Ocean
      # 
      # - name: Deploy to Digital Ocean
      #   if: success()
      #   uses: appleboy/ssh-action@master
      #   with:
      #     host: ${{ secrets.SERVER_HOST }}
      #     username: ${{ secrets.SERVER_USER }}
      #     key: ${{ secrets.SERVER_SSH_KEY }}
      #     port: 22
      #     script: |
      #       cd /app/money_tracker_bot
      #       git pull origin main
      #       source venv/bin/activate
      #       pip install -r requirements.txt
      #       pm2 restart money-tracker || pm2 start bot.py --name "money-tracker"
      #       pm2 save

  notify:
    runs-on: ubuntu-latest
    needs: test-and-deploy
    if: always()
    
    steps:
      - name: Notify deployment status
        run: |
          if [ "${{ needs.test-and-deploy.result }}" == "success" ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed!"
          fi
